<div id="modalContacto" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content bg-home">
            <h2 class="text-center mt-4">Escribe un comentario para contactar</h2>
            
            <div class="modal-body px-4">
                <form action="#" method="post">
                    <div class="mb-3">
                        <label class="form-label small">Nombre</label>
                        <input type="text" class="form-control" name="nombre" required>
                        
                        <label class="form-label small mt-3">Tu E-mail</label>
                        <input type="email" class="form-control" name="email" required>
                        
                        <label class="form-label small mt-3">Tu comentario</label>
                        <textarea class="form-control" name="comentario" rows="5" required></textarea>
                    </div>
                    <div class="mt-4 mb-2">
                        <button type="submit" class="btn btn-success w-100 py-2">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
