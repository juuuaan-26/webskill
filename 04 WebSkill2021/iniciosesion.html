<div id="modalLogin" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content bg-home">
            <h2 class="modal-title text-center mt-4">INICIA SESIÓN</h2>
            <div class="modal-body px-4">
                <form action="#" method="post">
                    <div class="mb-3">
                        <label class="form-label small">Usuario</label>
                        <input type="text" class="form-control" name="user" required>
                        
                        <label class="form-label small mt-3">Contraseña</label>
                        <input type="password" class="form-control" name="pass" required>
                    </div>
                    <div class="mt-4 mb-2">
                        <button type="submit" class="btn btn-success w-100 py-2">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
