<div id="modalregistro" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="modelTitleId" style="display: none;" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content bg-home">
            <h2 class="modal-title text-center mt-4">Registro de usuario</h2>
            <div class="modal-body px-4">
                <form action="#" method="post">
                    <div class="mb-3">
                        <label class="form-label small">Usuario</label>
                        <input type="text" class="form-control" name="user" required>
                        
                        <label class="form-label small mt-3">Contraseña</label>
                        <input type="password" class="form-control" name="pass" required>
                        
                        <label class="form-label small mt-3">Repite la contraseña</label>
                        <input type="password" class="form-control" name="pass2" required>
                        
                        <label class="form-label small mt-3">Email</label>
                        <input type="email" class="form-control" name="email" required>
                        
                        <label class="form-label small mt-3">Dirección</label>
                        <input type="text" class="form-control" name="direccion" required>
                        
                        <label class="form-label small mt-3">Teléfono</label>
                        <input type="text" class="form-control" name="telefono" required>
                    </div>
                    <div class="mt-4 mb-2">
                        <button type="submit" class="btn btn-success w-100 py-2">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
